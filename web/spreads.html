<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>進階牌陣 — claude-tarot</title>
  <meta name="description" content="意識與淺意識 / 時間之流 / 二多擇一 — 含心態牌的進階塔羅牌陣，AI 解讀 prompt 一鍵生成">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-primary: #9B7EBD;
      --color-cta: #E8C547;
      --color-cta-text: #1A0B2E;
      --color-text: #F5F0FA;
      --color-muted: #9F8AB8;
      --color-border: rgba(255, 255, 255, 0.12);
      --glass-bg: rgba(255, 255, 255, 0.06);
      --font-headline: 'Noto Serif TC', serif;
      --font-body: 'Noto Serif TC', serif;
      --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-soft: 0 4px 12px rgba(0, 0, 0, 0.25);
      --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.35);
      --shadow-gold: 0 0 24px rgba(232, 197, 71, 0.4);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      font-weight: 400;
      color: var(--color-text);
      background: linear-gradient(135deg, #1A0B2E 0%, #3D1F5F 50%, #1A0B2E 100%);
      background-attachment: fixed;
      line-height: 1.75;
      letter-spacing: 0.015em;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 35% 60%, rgba(255,255,255,0.35), transparent),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 25% 85%, rgba(255,255,255,0.35), transparent),
        radial-gradient(1.5px 1.5px at 55% 30%, rgba(232,197,71,0.5), transparent),
        radial-gradient(1.5px 1.5px at 10% 70%, rgba(232,197,71,0.3), transparent);
      background-size: 100% 100%;
      opacity: 0.7;
    }

    body > * { position: relative; z-index: 1; }

    h1, h2, h3 {
      font-family: var(--font-headline);
      font-weight: 700;
      line-height: 1.3;
      color: var(--color-text);
      letter-spacing: 0.04em;
    }
    h1 { font-size: clamp(2rem, 5vw, 3.25rem); }
    h2 { font-size: clamp(1.5rem, 3.5vw, 2.25rem); margin-bottom: 1rem; }
    h3 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.75rem; }

    a { color: var(--color-primary); transition: color var(--transition); }
    a:hover { color: var(--color-cta); }

    .container-tight { max-width: 760px; margin: 0 auto; padding: 0 1.5rem; }

    section { padding: 3rem 0; }
    @media (min-width: 768px) { section { padding: 5rem 0; } }
    #hero { padding: 4.5rem 0 2.5rem; }
    @media (min-width: 768px) { #hero { padding: 7rem 0 4rem; } }

    /* ===== Nav ===== */
    .site-nav {
      position: sticky;
      top: 0;
      z-index: 40;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(26, 11, 46, 0.7);
      border-bottom: 1px solid var(--color-border);
      transition: box-shadow var(--transition);
    }
    .site-nav.scrolled { box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0.875rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nav-brand {
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: 0.04em;
      color: var(--color-text);
      text-decoration: none;
    }
    .nav-brand:hover { color: var(--color-cta); }
    .nav-back {
      font-size: 0.92rem;
      color: var(--color-muted);
      text-decoration: none;
      transition: color var(--transition);
    }
    .nav-back:hover { color: var(--color-cta); }
    .nav-spacer { flex: 1; }
    .nav-pill {
      padding: 0.4rem 0.95rem;
      background: rgba(232, 197, 71, 0.12);
      border: 1px solid var(--color-cta);
      color: var(--color-cta);
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-decoration: none;
      transition: all var(--transition);
    }
    a.nav-pill:hover {
      background: var(--color-cta);
      color: var(--color-cta-text);
    }

    /* ===== Hero ===== */
    .hero-tag {
      display: inline-block;
      padding: 0.35rem 0.9rem;
      background: rgba(232, 197, 71, 0.1);
      border: 1px solid rgba(232, 197, 71, 0.3);
      border-radius: 999px;
      font-size: 0.85rem;
      color: var(--color-cta);
      letter-spacing: 0.08em;
      margin-bottom: 1.25rem;
    }
    .hero-desc {
      color: var(--color-muted);
      font-size: 1.05rem;
      margin-top: 1rem;
    }

    /* ===== Glass card ===== */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      box-shadow: var(--shadow-soft);
    }

    /* ===== Tool ===== */
    .tool-wrap { padding: 2rem; margin-top: 1.5rem; }
    @media (max-width: 480px) { .tool-wrap { padding: 1.5rem; } }

    /* Mode tabs（3 個進階牌陣） */
    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.375rem;
      padding: 0.375rem;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--color-border);
      border-radius: 999px;
      margin-bottom: 1.75rem;
    }
    .mode-tab {
      background: transparent;
      border: 0;
      color: var(--color-muted);
      padding: 0.6rem 0.4rem;
      border-radius: 999px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .mode-tab:hover { color: var(--color-text); }
    .mode-tab.active {
      background: var(--color-cta);
      color: var(--color-cta-text);
      font-weight: 600;
      box-shadow: var(--shadow-soft);
    }
    .mode-tab:focus-visible { outline: 2px solid var(--color-cta); outline-offset: 2px; }
    @media (max-width: 520px) {
      .mode-tab { font-size: 0.82rem; padding: 0.55rem 0.3rem; }
    }

    /* Field */
    .field { margin-bottom: 1.25rem; }
    .field-label, .field > label {
      display: block;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--color-muted);
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
    }
    .field input[type="text"],
    .field select,
    .manual-row select,
    .choice-title input {
      width: 100%;
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 1rem;
      transition: all var(--transition);
      appearance: none;
      -webkit-appearance: none;
    }
    .field input[type="text"]::placeholder,
    .choice-title input::placeholder { color: var(--color-muted); opacity: 0.6; }
    .field input[type="text"]:focus,
    .field select:focus,
    .manual-row select:focus,
    .choice-title input:focus {
      outline: none;
      border-color: var(--color-cta);
      box-shadow: 0 0 0 3px rgba(232, 197, 71, 0.15);
    }

    /* Radio pill（隨機 / 手動 / N 選擇） */
    .draw-mode, .n-choices { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .radio-pill { cursor: pointer; user-select: none; position: relative; }
    .radio-pill input { position: absolute; opacity: 0; pointer-events: none; }
    .radio-pill span {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--color-border);
      border-radius: 999px;
      font-size: 0.92rem;
      color: var(--color-muted);
      background: rgba(0, 0, 0, 0.2);
      transition: all var(--transition);
    }
    .radio-pill:hover span { color: var(--color-text); }
    .radio-pill input:checked + span {
      background: rgba(232, 197, 71, 0.12);
      border-color: var(--color-cta);
      color: var(--color-cta);
    }
    .radio-pill input:focus-visible + span { outline: 2px solid var(--color-cta); outline-offset: 2px; }

    /* Choices block（二多擇一專用：N + 各選擇標題） */
    .choices-block {
      padding: 1rem 1.1rem;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      margin-bottom: 1.25rem;
    }
    .choice-title { display: grid; gap: 0.625rem; margin-top: 0.875rem; }
    .choice-title-row {
      display: grid;
      grid-template-columns: 4rem 1fr;
      gap: 0.75rem;
      align-items: center;
    }
    .choice-title-row .label-tag {
      font-family: var(--font-headline);
      font-weight: 600;
      color: var(--color-cta);
      letter-spacing: 0.06em;
      text-align: center;
      padding: 0.45rem 0;
      border: 1px solid var(--color-cta);
      border-radius: 8px;
      background: rgba(232, 197, 71, 0.08);
    }

    /* Manual input */
    .manual-input { display: grid; gap: 0.875rem; margin-bottom: 1.25rem; }
    .manual-group-label {
      font-family: var(--font-headline);
      font-size: 0.95rem;
      color: var(--color-cta);
      letter-spacing: 0.08em;
      margin-top: 0.5rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px dashed rgba(232, 197, 71, 0.25);
    }
    .manual-row {
      display: grid;
      grid-template-columns: 6rem 1fr auto;
      gap: 0.75rem;
      align-items: center;
    }
    .position-label {
      font-family: var(--font-headline);
      font-weight: 600;
      color: var(--color-cta);
      letter-spacing: 0.04em;
      font-size: 0.95rem;
    }
    .reversed-check {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.88rem;
      color: var(--color-muted);
      white-space: nowrap;
      cursor: pointer;
    }
    .reversed-check input { accent-color: var(--color-cta); width: 1rem; height: 1rem; }
    @media (max-width: 520px) {
      .manual-row { grid-template-columns: 1fr; gap: 0.4rem; }
      .position-label { font-size: 1.05rem; }
    }

    /* CTA button */
    .cta-primary {
      display: inline-block;
      padding: 0.9rem 2rem;
      background: var(--color-cta);
      color: var(--color-cta-text);
      border-radius: 999px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      border: 0;
      cursor: pointer;
      transition: all var(--transition);
      box-shadow: var(--shadow-soft);
    }
    .cta-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-gold);
    }
    .cta-primary:focus-visible { outline: 3px solid var(--color-primary); outline-offset: 3px; }
    .cta-block { display: block; width: 100%; text-align: center; }

    /* Result */
    .result {
      margin-top: 2.5rem;
      padding-top: 2rem;
      border-top: 1px solid var(--color-border);
    }
    .spread-heading {
      font-family: var(--font-headline);
      font-size: 1rem;
      color: var(--color-muted);
      letter-spacing: 0.1em;
      margin: 1.5rem 0 0.875rem;
      text-align: center;
    }
    .spread-heading:first-child { margin-top: 0; }

    .cards {
      display: grid;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }
    .cards.row-2 { grid-template-columns: 1fr 1fr; }
    .cards.row-3 { grid-template-columns: 1fr 1fr 1fr; }
    .cards.row-1 { grid-template-columns: 1fr; max-width: 220px; margin-left: auto; margin-right: auto; }
    @media (max-width: 600px) {
      .cards.row-2, .cards.row-3 { grid-template-columns: 1fr; }
    }

    /* Choice group（二多擇一：每個選擇 2 張並列） */
    .choice-group {
      padding: 1rem;
      border: 1px dashed rgba(232, 197, 71, 0.25);
      border-radius: 12px;
      margin-bottom: 1rem;
    }
    .choice-group-title {
      font-family: var(--font-headline);
      font-weight: 600;
      color: var(--color-cta);
      letter-spacing: 0.06em;
      text-align: center;
      margin-bottom: 0.875rem;
      font-size: 1.05rem;
    }

    /* Card tile */
    .card-tile {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 1.1rem;
      text-align: center;
    }
    .card-tile .pos {
      display: block;
      font-size: 0.75rem;
      color: var(--color-cta);
      letter-spacing: 0.12em;
      margin-bottom: 0.5rem;
    }
    .card-tile-img-wrap {
      margin: 0 auto 0.75rem;
      width: 100%;
      max-width: 200px;
      aspect-ratio: 3 / 5;
      border-radius: 8px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--color-border);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }
    .card-tile-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 400ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-tile-img-wrap.reversed img { transform: rotate(180deg); }
    .card-tile .name {
      font-family: var(--font-headline);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 0.2rem;
      letter-spacing: 0.04em;
    }
    .card-tile .orientation {
      font-size: 0.82rem;
      color: var(--color-muted);
    }

    /* 心態牌（底牌）— 金邊 + 置中 + 區隔 */
    .bottom-card-wrap {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px dashed rgba(232, 197, 71, 0.35);
    }
    .bottom-card-label {
      text-align: center;
      font-family: var(--font-headline);
      font-size: 0.95rem;
      color: var(--color-cta);
      letter-spacing: 0.18em;
      margin-bottom: 0.875rem;
    }
    .bottom-card {
      max-width: 240px;
      margin: 0 auto;
      background: rgba(232, 197, 71, 0.08);
      border: 2px solid var(--color-cta);
      box-shadow: var(--shadow-gold);
    }
    .bottom-card .pos { color: var(--color-cta); font-weight: 600; }

    /* Prompt block */
    .prompt-block { margin-top: 2rem; }
    .prompt-block > label {
      display: block;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--color-muted);
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
    }
    #prompt-preview {
      background: rgba(0, 0, 0, 0.38);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 1rem 1.125rem;
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 0.85rem;
      line-height: 1.65;
      color: var(--color-text);
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 400px;
      overflow-y: auto;
      margin: 0;
    }
    .prompt-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-top: 0.875rem;
      flex-wrap: wrap;
    }
    .copy-status {
      font-size: 0.85rem;
      color: var(--color-cta);
      opacity: 0;
      transition: opacity var(--transition);
    }
    .copy-status.show { opacity: 1; }
    .hint {
      font-size: 0.85rem;
      color: var(--color-muted);
      margin-top: 0.875rem;
      line-height: 1.65;
    }

    /* Mode intro */
    .mode-intro {
      padding: 0.875rem 1rem;
      background: rgba(155, 126, 189, 0.08);
      border-left: 3px solid var(--color-primary);
      border-radius: 8px;
      font-size: 0.92rem;
      color: var(--color-text);
      opacity: 0.85;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
      body::before { opacity: 0.3; }
    }
  </style>
</head>
<body>

  <!-- ===== Nav ===== -->
  <nav class="site-nav" id="siteNav">
    <div class="nav-inner">
      <a class="nav-back" href="index.html">← 回首頁</a>
      <a class="nav-brand" href="index.html">claude-tarot</a>
      <span class="nav-spacer"></span>
      <a class="nav-pill" href="index.html">基本牌陣</a>
    </div>
  </nav>

  <a id="top"></a>

  <!-- 1. Hero -->
  <section id="hero">
    <div class="container-tight text-center">
      <span class="hero-tag">專家模式</span>
      <h1>進階牌陣</h1>
      <p class="hero-desc">
        意識與淺意識・時間之流・二多擇一<br>
        每個牌陣末尾自動帶一張「心態牌」當底牌
      </p>
    </div>
  </section>

  <!-- ===== Tool ===== -->
  <section id="tarot-tool">
    <div class="container-tight">

      <div class="tool-wrap glass">

        <!-- 模式 tabs -->
        <div class="mode-tabs" role="tablist" aria-label="模式選擇">
          <button type="button" class="mode-tab active" data-mode="awareness" role="tab" aria-selected="true">意識與淺意識</button>
          <button type="button" class="mode-tab" data-mode="timeflow" role="tab" aria-selected="false">時間之流</button>
          <button type="button" class="mode-tab" data-mode="choices" role="tab" aria-selected="false">二多擇一</button>
        </div>

        <!-- 模式說明 -->
        <div class="mode-intro" id="mode-intro"></div>

        <!-- 二多擇一專用：N 選擇器 + 選擇標題 -->
        <div class="choices-block" id="choices-block" hidden>
          <span class="field-label">幾個選擇？</span>
          <div class="n-choices">
            <label class="radio-pill">
              <input type="radio" name="n-choices" value="2" checked />
              <span>2 個</span>
            </label>
            <label class="radio-pill">
              <input type="radio" name="n-choices" value="3" />
              <span>3 個</span>
            </label>
          </div>
          <div class="choice-title" id="choice-title-list"></div>
        </div>

        <!-- 問題 input -->
        <div class="field" id="question-field">
          <label for="question">你的問題</label>
          <input type="text" id="question" placeholder="輸入想問的問題（可留白）" autocomplete="off" />
        </div>

        <!-- 抽牌方式 -->
        <div class="field">
          <span class="field-label">抽牌方式</span>
          <div class="draw-mode">
            <label class="radio-pill">
              <input type="radio" name="draw-mode" value="random" checked />
              <span>隨機抽</span>
            </label>
            <label class="radio-pill">
              <input type="radio" name="draw-mode" value="manual" />
              <span>我自己抽</span>
            </label>
          </div>
        </div>

        <!-- 手動選牌 -->
        <div class="manual-input" id="manual-input" hidden></div>

        <!-- 抽牌按鈕 -->
        <div class="action">
          <button type="button" id="draw-btn" class="cta-primary cta-block">抽牌</button>
        </div>

        <!-- 結果 -->
        <div id="result" class="result" hidden>
          <div id="result-cards"></div>
          <div class="prompt-block">
            <label for="prompt-preview">產生的 Prompt</label>
            <pre id="prompt-preview"></pre>
            <div class="prompt-actions">
              <button type="button" id="copy-btn" class="cta-primary">複製 Prompt</button>
              <button type="button" id="ask-gpt-btn" class="cta-primary">詢問 ChatGPT →</button>
              <button type="button" id="ask-claude-btn" class="cta-primary">詢問 Claude →</button>
              <span id="copy-status" class="copy-status" aria-live="polite"></span>
            </div>
            <p class="hint">按「詢問 ChatGPT」或「詢問 Claude」自動開新分頁帶 prompt 過去、或複製貼到 Gemini。</p>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- ===== 牌組資料：78 張 RWS（與 index.html 同步） ===== -->
  <script>
    const CARDS_META = {"source": "Rider-Waite-Smith tradition; keywords and symbolism derived from Arthur Edward Waite, The Pictorial Key to the Tarot (1910, public domain)", "license": "MIT (this JSON), public-domain source material", "updated": "2026-05-14", "card_count": 78};
    const CARDS = [
  {
    "name_zh": "愚人",
    "name_en": "The Fool",
    "number": 0,
    "arcana": "major",
    "element": "Air",
    "upright_keywords": [
      "新開始",
      "自由",
      "純真",
      "冒險",
      "信任"
    ],
    "reversed_keywords": [
      "輕率",

  <script>
    // Nav scroll shadow
    const nav = document.getElementById('siteNav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 8);
    }, { passive: true });
  </script>

  <!-- ===== 進階牌陣邏輯 ===== -->
  <script>
    (function () {
      const $ = (sel, root) => (root || document).querySelector(sel);
      const $$ = (sel, root) => Array.from((root || document).querySelectorAll(sel));

      // 牌位定義：每模式陣列是「主牌位」、心態牌統一額外加在最後
      const POSITIONS = {
        awareness: ['意識（頭腦）', '潛意識（身體・直覺）'],
        timeflow:  ['過去', '現在', '未來'],
        // choices: 動態組成「現況、A·過程、A·結果、B·過程、B·結果、...」
      };

      const MODE_INTRO = {
        awareness: '抽 2 張＋心態牌底牌。比較頭腦怎麼想跟身體/直覺怎麼感受、適合內外不一致時釐清。',
        timeflow:  '抽 3 張＋心態牌底牌。過去→現在→未來，看事件的能量流動方向。',
        choices:   '抽 1 張（現況）＋每個選擇 2 張（過程、結果）＋心態牌底牌。最多 3 個選擇、適合在岔路口比較。',
      };

      const state = {
        mode: 'awareness',     // 'awareness' | 'timeflow' | 'choices'
        drawMode: 'random',    // 'random' | 'manual'
        nChoices: 2,           // choices 模式專用：2 或 3
        choiceTitles: ['A', 'B', 'C'],
        lastDraws: null,
        lastPrompt: '',
      };

      // DOM refs
      const modeTabs = $$('.mode-tab');
      const modeIntro = $('#mode-intro');
      const choicesBlock = $('#choices-block');
      const choiceTitleList = $('#choice-title-list');
      const nChoicesRadios = $$('input[name="n-choices"]');
      const questionField = $('#question-field');
      const drawModeRadios = $$('input[name="draw-mode"]');
      const manualInput = $('#manual-input');
      const drawBtn = $('#draw-btn');
      const resultSection = $('#result');
      const resultCards = $('#result-cards');
      const promptPreview = $('#prompt-preview');

      // 無放回抽樣
      function sampleWithoutReplacement(n, k) {
        const pool = Array.from({ length: n }, (_, i) => i);
        const out = [];
        for (let i = 0; i < k; i++) {
          const j = Math.floor(Math.random() * pool.length);
          out.push(pool.splice(j, 1)[0]);
        }
        return out;
      }

      // 主牌位陣列（不含心態牌）
      function getMainPositions() {
        if (state.mode === 'choices') {
          const titles = state.choiceTitles.slice(0, state.nChoices);
          const out = ['現況'];
          titles.forEach(t => {
            out.push(`${t} · 過程`);
            out.push(`${t} · 結果`);
          });
          return out;
        }
        return POSITIONS[state.mode];
      }

      // 總牌數（含心態牌）
      function getTotalCount() {
        return getMainPositions().length + 1; // +1 心態牌
      }

      // ===== Mode tabs =====
      function setMode(mode) {
        state.mode = mode;
        modeTabs.forEach(t => {
          const active = t.dataset.mode === mode;
          t.classList.toggle('active', active);
          t.setAttribute('aria-selected', active ? 'true' : 'false');
        });
        modeIntro.textContent = MODE_INTRO[mode];
        choicesBlock.hidden = (mode !== 'choices');
        if (mode === 'choices') renderChoiceTitleList();
        if (state.drawMode === 'manual') renderManualInput();
        resultSection.hidden = true;
      }

      // ===== 二多擇一：選擇標題 input =====
      function renderChoiceTitleList() {
        const defaults = ['A', 'B', 'C'];
        const rows = [];
        for (let i = 0; i < state.nChoices; i++) {
          const cur = state.choiceTitles[i] || defaults[i];
          rows.push(`
            <div class="choice-title-row">
              <span class="label-tag">${defaults[i]}</span>
              <input type="text" data-idx="${i}" value="${cur}" placeholder="如「接受 offer」、「不接」、「再等等」" />
            </div>
          `);
        }
        choiceTitleList.innerHTML = rows.join('');
        $$('input', choiceTitleList).forEach(inp => {
          inp.addEventListener('input', (e) => {
            const idx = parseInt(e.target.dataset.idx, 10);
            state.choiceTitles[idx] = e.target.value.trim() || defaults[idx];
            if (state.drawMode === 'manual') renderManualInput();
          });
        });
      }

      function setNChoices(n) {
        state.nChoices = n;
        renderChoiceTitleList();
        if (state.drawMode === 'manual') renderManualInput();
      }

      // ===== Draw mode =====
      function setDrawMode(dm) {
        state.drawMode = dm;
        if (dm === 'manual') {
          renderManualInput();
          manualInput.hidden = false;
        } else {
          manualInput.hidden = true;
        }
      }

      // ===== 手動選牌渲染（含心態牌） =====
      function renderManualInput() {
        const mainPositions = getMainPositions();
        const total = mainPositions.length + 1;
        const options = CARDS.map((c, idx) =>
          `<option value="${idx}">${c.name_zh}</option>`
        ).join('');

        const rows = [];
        // 主牌位
        mainPositions.forEach((pos, i) => {
          rows.push(`
            <div class="manual-row" data-slot="${i}">
              <span class="position-label">${pos}</span>
              <select class="manual-card-select" data-slot="${i}" aria-label="${pos}">
                ${options}
              </select>
              <label class="reversed-check">
                <input type="checkbox" class="manual-reversed" data-slot="${i}" />
                <span>逆位</span>
              </label>
            </div>
          `);
        });
        // 心態牌（最後一張、特殊樣式）
        rows.push(`
          <div class="manual-group-label">底牌</div>
          <div class="manual-row" data-slot="${total - 1}">
            <span class="position-label">心態牌</span>
            <select class="manual-card-select" data-slot="${total - 1}" aria-label="心態牌">
              ${options}
            </select>
            <label class="reversed-check">
              <input type="checkbox" class="manual-reversed" data-slot="${total - 1}" />
              <span>逆位</span>
            </label>
          </div>
        `);
        manualInput.innerHTML = rows.join('');

        // 預設 N 張不同牌避免一開始全部「愚人」
        const selects = $$('.manual-card-select', manualInput);
        selects.forEach((s, i) => { s.value = String(i % CARDS.length); });
      }

      // ===== 抽牌 =====
      function drawRandom() {
        const mainPositions = getMainPositions();
        const total = mainPositions.length + 1;
        const indices = sampleWithoutReplacement(CARDS.length, total);
        const out = indices.map((idx, i) => ({
          card: CARDS[idx],
          reversed: Math.random() < 0.5,
          position: i < mainPositions.length ? mainPositions[i] : '心態牌',
          isBottom: i === mainPositions.length, // 最後一張是心態牌
        }));
        return out;
      }

      function drawManual() {
        const mainPositions = getMainPositions();
        const total = mainPositions.length + 1;
        const selects = $$('.manual-card-select', manualInput);
        const checks = $$('.manual-reversed', manualInput);
        const out = [];
        for (let i = 0; i < total; i++) {
          const idx = parseInt(selects[i].value, 10);
          out.push({
            card: CARDS[idx],
            reversed: checks[i].checked,
            position: i < mainPositions.length ? mainPositions[i] : '心態牌',
            isBottom: i === mainPositions.length,
          });
        }
        return out;
      }

      // ===== Prompt 生成器 =====
      const ARCANA_ZH = {
        major: '大阿爾克納',
        wands: '小阿爾克納 · 權杖',
        cups: '小阿爾克納 · 聖杯',
        swords: '小阿爾克納 · 寶劍',
        pentacles: '小阿爾克納 · 錢幣',
      };

      function buildPrompt(mode, draws, question) {
        const targetWords =
          mode === 'awareness' ? '200-300'
          : mode === 'timeflow' ? '350-500'
          : '500-800';

        const modeName =
          mode === 'awareness' ? '意識與淺意識（2 牌 + 心態牌）'
          : mode === 'timeflow' ? '時間之流（3 牌 + 心態牌）'
          : `二多擇一（現況 + ${state.nChoices} 選擇 × 過程結果 + 心態牌）`;

        const role = `你是塔羅解讀師，依 Rider-Waite-Smith 傳統解讀「${modeName}」牌陣。`;
        const style = `回應 ${targetWords} 字，繁體中文，語氣沉穩、不誇大、不命定論。`;

        // 牌列
        const cardLines = draws.map(d => {
          const kws = (d.reversed ? d.card.reversed_keywords : d.card.upright_keywords).slice(0, 3).join('、');
          const arcana = ARCANA_ZH[d.card.arcana] || d.card.arcana;
          const tag = d.isBottom ? `[心態牌·底牌]` : `[${d.position}]`;
          return `${tag} ${d.card.name_zh}（${d.reversed ? '逆位' : '正位'}）— ${arcana}；關鍵字：${kws}`;
        }).join('\n');

        // 解讀任務
        let task = '';
        if (mode === 'awareness') {
          task = '請依「意識面 vs 潛意識」對比解讀：頭腦怎麼想、身體/直覺怎麼感受、兩者落差在哪、心態牌如何承接。';
        } else if (mode === 'timeflow') {
          task = '請依「過去 → 現在 → 未來」三段解讀，並用心態牌串接整體調性、給整體建議。';
        } else {
          const titles = state.choiceTitles.slice(0, state.nChoices).join(' / ');
          task = `請依「現況」起手、逐一比較 ${state.nChoices} 個選擇（${titles}）的過程與結果，最後用心態牌收束、給整體建議。`;
        }

        const askLine = question && question.trim() ? `\n\n問題：${question.trim()}` : '';

        return `${role}\n${style}\n\n抽到的牌：\n${cardLines}${askLine}\n\n${task}`;
      }

      // ===== 結果渲染 =====
      function renderCardTile(d, isBottom) {
        const cls = 'card-tile' + (isBottom ? ' bottom-card' : '');
        const posLine = isBottom ? '' : `<span class="pos">${d.position}</span>`;
        return `
          <div class="${cls}">
            ${posLine}
            <div class="card-tile-img-wrap ${d.reversed ? 'reversed' : ''}">
              <img src="${d.card.image}" alt="${d.card.name_zh}" loading="lazy" />
            </div>
            <div class="name">${d.card.name_zh}</div>
            <div class="orientation">${d.reversed ? '逆位' : '正位'} · ${d.card.name_en}</div>
          </div>
        `;
      }

      function renderResult(draws) {
        const mainDraws = draws.filter(d => !d.isBottom);
        const bottomDraw = draws.find(d => d.isBottom);
        let html = '';

        if (state.mode === 'awareness') {
          // 2 張並列
          html += '<div class="spread-heading">意識 / 潛意識</div>';
          html += '<div class="cards row-2">';
          html += mainDraws.map(d => renderCardTile(d, false)).join('');
          html += '</div>';
        } else if (state.mode === 'timeflow') {
          // 3 張並列
          html += '<div class="spread-heading">過去 → 現在 → 未來</div>';
          html += '<div class="cards row-3">';
          html += mainDraws.map(d => renderCardTile(d, false)).join('');
          html += '</div>';
        } else {
          // choices: 現況 1 張在上、N 組（過程+結果）並列
          html += '<div class="spread-heading">現況</div>';
          html += '<div class="cards row-1">';
          html += renderCardTile(mainDraws[0], false);
          html += '</div>';

          const titles = state.choiceTitles.slice(0, state.nChoices);
          for (let i = 0; i < state.nChoices; i++) {
            const procDraw = mainDraws[1 + i * 2];
            const resultDraw = mainDraws[2 + i * 2];
            html += `<div class="choice-group">`;
            html += `<div class="choice-group-title">${titles[i]}</div>`;
            html += '<div class="cards row-2">';
            html += renderCardTile(procDraw, false);
            html += renderCardTile(resultDraw, false);
            html += '</div>';
            html += '</div>';
          }
        }

        // 心態牌底牌
        html += '<div class="bottom-card-wrap">';
        html += '<div class="bottom-card-label">心態牌 · 底牌</div>';
        html += renderCardTile(bottomDraw, true);
        html += '</div>';

        resultCards.innerHTML = html;

        const question = $('#question').value;
        const promptText = buildPrompt(state.mode, draws, question);
        promptPreview.textContent = promptText;
        state.lastPrompt = promptText;

        resultSection.hidden = false;
        resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      // ===== Copy 按鈕 =====
      const copyBtn = $('#copy-btn');
      const copyStatus = $('#copy-status');
      let copyResetTimer = null;
      async function handleCopy() {
        const text = promptPreview.textContent || '';
        if (!text) return;
        try {
          await navigator.clipboard.writeText(text);
          copyStatus.textContent = '✓ 已複製，貼到任一 LLM';
          copyStatus.classList.add('show');
        } catch (err) {
          const range = document.createRange();
          range.selectNodeContents(promptPreview);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
          copyStatus.textContent = '⚠ 自動複製被擋，請手動 ⌘+C';
          copyStatus.classList.add('show');
        }
        clearTimeout(copyResetTimer);
        copyResetTimer = setTimeout(() => copyStatus.classList.remove('show'), 2500);
      }
      copyBtn.addEventListener('click', handleCopy);

      // ===== 詢問 ChatGPT 按鈕（URL ?prompt= 帶 prompt 開新 tab、無需 API key）=====
      const askGptBtn = $('#ask-gpt-btn');
      function handleAskGpt() {
        const text = promptPreview.textContent || '';
        if (!text) return;
        const url = `https://chatgpt.com/?prompt=${encodeURIComponent(text)}`;
        window.open(url, '_blank', 'noopener,noreferrer');
      }
      if (askGptBtn) askGptBtn.addEventListener('click', handleAskGpt);

      // ===== 詢問 Claude 按鈕（URL ?q= 帶 prompt 開新 tab、無需 API key）=====
      const askClaudeBtn = $('#ask-claude-btn');
      function handleAskClaude() {
        const text = promptPreview.textContent || '';
        if (!text) return;
        const url = `https://claude.ai/new?q=${encodeURIComponent(text)}`;
        window.open(url, '_blank', 'noopener,noreferrer');
      }
      if (askClaudeBtn) askClaudeBtn.addEventListener('click', handleAskClaude);

      // ===== 抽牌按鈕 =====
      function handleDraw() {
        let draws;
        if (state.drawMode === 'manual') {
          draws = drawManual();
          const names = draws.map(d => d.card.name_en);
          if (new Set(names).size < names.length) {
            alert(`此牌陣需 ${names.length} 張不同的牌、請調整手動選擇。`);
            return;
          }
        } else {
          draws = drawRandom();
        }
        state.lastDraws = draws;
        renderResult(draws);
      }

      // ===== Events =====
      modeTabs.forEach(t => t.addEventListener('click', () => setMode(t.dataset.mode)));
      drawModeRadios.forEach(r => r.addEventListener('change', (e) => setDrawMode(e.target.value)));
      nChoicesRadios.forEach(r => r.addEventListener('change', (e) => setNChoices(parseInt(e.target.value, 10))));
      drawBtn.addEventListener('click', handleDraw);

      // ===== Init =====
      setMode('awareness');
      setDrawMode('random');

      window.__tarotState = state;
    })();
  </script>

</body>
</html>
